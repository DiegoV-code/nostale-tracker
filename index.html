<!DOCTYPE html>
<html lang="it" data-theme="dark">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nostale Tracker</title>
    <script>
      // Prevent theme flash: apply saved theme before paint
      (function(){var t=localStorage.getItem("nostale-theme");if(t)document.documentElement.setAttribute("data-theme",t)})()
    </script>
    <style>
      /* Minimal pre-CSS: prevent flash of unstyled content */
      body{background:#13151f;overflow:hidden}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
